name: Sync GitHub Document

on:
  schedule:
    # 每天 UTC 时间 1:00 和 23:00（北京时间 9:00 和 7:00+1=次日 9:00，23:00+1=次日 7:00）不对
    # 修正：北京时间 9:00 = UTC 1:00, 北京时间 23:00 = UTC 15:00
    - cron: '0 1 * * *'   # 北京时间 9:00
    - cron: '0 15 * * *'  # 北京时间 23:00
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx
          
      - name: Sync article from GitHub
        run: python backend/scripts/sync.py
        
      - name: Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add frontend/public/data/article.json || true
          if ! git diff --staged --quiet; then
            git commit -m "docs: auto-update article [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
